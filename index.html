<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>어연걸 ♥ 김소정 - 결혼합니다</title>

<script>
  /**
   * 최적화: iOS 카카오톡 인앱 브라우저 대응
   * 뷰포트 높이 변화로 인한 영상 튐 현상을 막기 위해 초기 높이를 고정합니다.
   */
  function setVh() {
    let vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
  }
  setVh();
  // 가로/세로 전환 시에만 다시 계산 (스크롤 시에는 무시)
  window.addEventListener('orientationchange', setVh);

  var ua = navigator.userAgent;
  var isSafari = /Safari/.test(ua) && !/Chrome/.test(ua) && !/KAKAOTALK/.test(ua);
  document.documentElement.setAttribute('data-browser', isSafari ? 'safari' : 'other');
</script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+KR:wght@200;300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --vh: 1vh;
  --ivory: #faf6f0;
  --rose: #c97d6e;
  --gold: #c9a96e;
  --deep: #3d3530;
}

body {
  background: var(--ivory);
  font-family: 'Noto Serif KR', serif;
  color: var(--deep);
  overflow-x: hidden;
  max-width: 480px;
  margin: 0 auto;
  /* iOS 카카오톡 스크롤 바운스 시 영상 이질감 완화 */
  -webkit-overflow-scrolling: touch;
}

/* ═══ HERO (첫 화면) ═══ */
.hero {
  /* --vh를 사용하여 브라우저 하단바 변화에도 높이를 일정하게 유지 */
  height: calc(var(--vh, 1vh) * 100);
  width: 100%;
  position: relative;
  overflow: hidden;
  background-color: #000;
}

.hero-video {
  /* ★ 핵심 수정: fixed 대신 absolute 사용
     스크롤 시 영상이 뷰포트에 박혀있는 게 아니라, 
     페이지 콘텐츠와 함께 위로 올라가게 하여 이질감을 제거합니다.
  */
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: translate(-50%, -50%);
  z-index: 0;
  /* 하드웨어 가속 강제 (깜빡임 방지) */
  -webkit-transform: translate(-50%, -50%) translateZ(0);
  will-change: transform;
}

/* Safari/카카오톡 전용 오버라이드 제거 
   (기존 data-browser="safari" 관련 fixed 코드는 삭제하거나 아래처럼 absolute로 통일) */
[data-browser="safari"] .hero-video {
  position: absolute;
  height: 100.5%; /* 미세한 틈 방지 */
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, 
    rgba(0,0,0,0.2) 0%, 
    transparent 50%, 
    rgba(0,0,0,0.5) 100%);
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 3;
  text-align: center;
  color: #fff;
  padding-top: 40px;
}

/* ═══ 이후 섹션 ═══ */
.section {
  padding: 80px 32px;
  background: #fff;
  position: relative;
  z-index: 10; /* 영상 위로 덮으며 올라오도록 설정 */
}

/* 애니메이션 및 기타 스타일은 기존과 동일하게 유지... */
.hero-monogram {
  font-family:'Great Vibes',cursive; 
  font-size:80px; 
  text-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* ... 중략 ... */
</style>
</head>
<body>

<section class="hero">
  <video class="hero-video" id="hero-video"
    autoplay muted loop playsinline
    webkit-playsinline
    preload="auto"
    poster="https://raw.githubusercontent.com/ygeo1204/ygeo/main/KakaoTalk_20260308_195422244.jpg">
    <source src="https://github.com/ygeo1204/ygeo/raw/refs/heads/main/%EB%AA%A8%EC%85%98%ED%8F%AC%ED%86%A0_%EC%84%B8%EB%A1%9C%ED%98%95.mp4" type="video/mp4">
  </video>
  
  <div class="hero-overlay"></div>
  
  <div class="hero-content">
    <p style="letter-spacing: 3px; font-size: 12px; margin-bottom: 20px;">WEDDING INVITATION</p>
    <div class="hero-monogram">Y & S</div>
    <div class="hero-names" style="font-size: 24px; margin-top: 10px;">어연걸 & 김소정</div>
    <div style="margin-top: 30px; font-size: 14px; opacity: 0.9;">2026. 09. 20. SUN PM 1:20</div>
  </div>

  <div class="scroll-hint" style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 3;">
    <div style="width: 1px; height: 50px; background: rgba(255,255,255,0.5); margin: 0 auto;"></div>
  </div>
</section>

<section class="section">
  <div style="text-align: center;">
    <h2 style="font-size: 20px; color: var(--rose); margin-bottom: 20px;">서로의 꽃이 되어</h2>
    <p style="line-height: 2; font-size: 15px;">
      곁에 있을 때 가장 나다워지는 사람을 만났습니다.<br>
      함께 걷는 이 길이 때로는 비바람 불지라도<br>
      서로가 지붕이 되어주며 행복하게 살겠습니다.
    </p>
  </div>
</section>

<script>
  // 영상이 로드되면 페이드인 효과를 주어 이질감을 줄일 수 있습니다.
  const video = document.getElementById('hero-video');
  video.addEventListener('loadeddata', function() {
    video.style.opacity = "1";
  });
</script>

</body>
</html>
