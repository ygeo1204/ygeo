<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>어연걸 ♥ 김소정 - 결혼합니다</title>

<script>
  function setScreenSize() {
    let vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
  }
  setScreenSize();
  // 리사이즈 시마다 계산하면 꿀렁이므로 오리엔테이션 변경 시에만 대응
  window.addEventListener('orientationchange', setScreenSize);

  var ua = navigator.userAgent;
  var isSafariBrowser = /Safari/.test(ua) &&
    !/Chrome/.test(ua) &&
    !/CriOS/.test(ua) &&
    !/OPiOS/.test(ua) &&
    !/FxiOS/.test(ua) &&
    !/KAKAOTALK/.test(ua) &&
    !/NAVER/.test(ua) &&
    !/SamsungBrowser/.test(ua);

  document.documentElement.setAttribute('data-browser', isSafariBrowser ? 'safari' : 'other');
</script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+KR:wght@200;300;400&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --vh: 1vh;
  --ivory: #faf6f0;
  --blush: #e8c4b8;
  --rose: #c97d6e;
  --sage: #8a9e8a;
  --deep: #3d3530;
  --gold: #c9a96e;
  --petal: #f2ddd7;
  --mist: #e8ede8;
}

html { scroll-behavior: smooth; }

body {
  background: var(--ivory);
  font-family: 'Noto Serif KR', serif;
  color: var(--deep);
  overflow-x: hidden;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overscroll-behavior: none;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

/* ═══ MUSIC BUTTON ═══ */
#music-btn {
  position: fixed;
  top: 16px; right: 16px;
  z-index: 900;
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  transition: all .3s ease;
}
#music-btn:active { transform: scale(0.92); }

.music-bars { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
.music-bars span { width: 3px; background: var(--rose); border-radius: 2px; transform-origin: bottom; }
.music-bars span:nth-child(1) { height: 8px; }
.music-bars span:nth-child(2) { height: 14px; }
.music-bars span:nth-child(3) { height: 10px; }
.music-bars span:nth-child(4) { height: 6px; }

#music-btn.playing .music-bars span:nth-child(1) { animation: bar1 .8s ease-in-out infinite alternate; }
#music-btn.playing .music-bars span:nth-child(2) { animation: bar2 .6s ease-in-out infinite alternate; }
#music-btn.playing .music-bars span:nth-child(3) { animation: bar3 .9s ease-in-out infinite alternate; }
#music-btn.playing .music-bars span:nth-child(4) { animation: bar4 .7s ease-in-out infinite alternate; }

@keyframes bar1 { from{height:4px} to{height:12px} }
@keyframes bar2 { from{height:6px} to{height:16px} }
@keyframes bar3 { from{height:8px} to{height:10px} }
@keyframes bar4 { from{height:3px} to{height:8px} }

/* ═══ HERO ═══ */
.hero {
  height: calc(var(--vh, 1vh) * 100);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  -webkit-transform: translate3d(0,0,0);
  transform: translate3d(0,0,0);
  isolation: isolate;
  background: #000;
}

/* ★ 수정 포인트: 카카오톡 브라우저 상하단 바 대응
  fixed를 쓰면 스크롤 시 브라우저 UI 변화에 따라 영상 크기가 재계산되어 이질감이 듭니다.
  모든 브라우저에서 absolute를 기본으로 사용하되 부모(.hero)에 꽉 채워 
  스크롤 시 자연스럽게 위로 올라가게 합니다.
*/
.hero-video {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
  -webkit-transform: translate3d(0,0,0);
  transform: translate3d(0,0,0);
  will-change: transform;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

/* Safari(브라우저 앱)에서만 fixed 전략 유지하고 싶을 경우에만 사용, 
   카카오톡 등 WebView에서는 absolute가 훨씬 안정적입니다. */
[data-browser="safari"] .hero-video {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  max-width: 480px;
}

.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(61,53,48,.32) 0%, rgba(61,53,48,.08) 40%, rgba(61,53,48,.55) 100%);
  z-index: 1;
}

.hero-fallback {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, #fdf8f3 0%, #f0e4dc 45%, #e4d0c8 100%);
  z-index: 0;
  transition: opacity 0.5s ease;
}
.hero-fallback.hide { opacity: 0; pointer-events: none; }

/* 꽃잎 */
.hero-petals { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 2; }
.petal {
  position: absolute;
  border-radius: 50% 0 50% 0;
  opacity: 0;
  animation: petalFall linear infinite;
  will-change: transform;
}
@keyframes petalFall {
  0%    { transform: translateY(-60px) rotate(0deg); opacity: 0; }
  10%   { opacity: .6; }
  90%   { opacity: .3; }
  100% { transform: translateY(110vh) rotate(720deg) translateX(30px); opacity: 0; }
}
.petal:nth-child(1)  { left:10%; width:12px; height:16px; background:#e8b4a8aa; animation-duration:7s;   animation-delay:0s; }
.petal:nth-child(2)  { left:25%; width:8px;  height:12px; background:#f2c9bfaa; animation-duration:9s;   animation-delay:1s; }
.petal:nth-child(3)  { left:40%; width:14px; height:10px; background:#d4a090aa; animation-duration:6s;   animation-delay:2s; }
.petal:nth-child(4)  { left:60%; width:10px; height:14px; background:#e8c4b8aa; animation-duration:8s;   animation-delay:.5s; }
.petal:nth-child(5)  { left:75%; width:12px; height:8px;  background:#f0d0c8aa; animation-duration:10s;  animation-delay:3s; }
.petal:nth-child(6)  { left:85%; width:8px;  height:12px; background:#dba89eaa; animation-duration:7.5s; animation-delay:1.5s; }
.petal:nth-child(7)  { left:5%;  width:10px; height:14px; background:#f4d0c6aa; animation-duration:8.5s; animation-delay:4s; }
.petal:nth-child(8)  { left:50%; width:14px; height:10px; background:#e0b0a4aa; animation-duration:6.5s; animation-delay:2.5s; }
.petal:nth-child(9)  { left:90%; width:8px;  height:10px; background:#f2c0b4aa; animation-duration:9.5s; animation-delay:.8s; }
.petal:nth-child(10) { left:33%; width:12px; height:8px;  background:#d8a498aa; animation-duration:7.2s; animation-delay:3.5s; }

.deco-circles { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
.deco-circle {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.18);
  top: 50%; left: 50%;
  animation: breathe 4s ease-in-out infinite;
}
.deco-circle:nth-child(1) { width:260px; height:260px; transform:translate(-50%,-50%); }
.deco-circle:nth-child(2) { width:320px; height:320px; transform:translate(-50%,-50%); animation-delay:.5s; border-color:rgba(255,255,255,.1); }
.deco-circle:nth-child(3) { width:380px; height:380px; transform:translate(-50%,-50%); animation-delay:1s; border-color:rgba(201,169,110,.12); }
@keyframes breathe { 0%,100%{opacity:.6} 50%{opacity:1} }

.hero-content {
  position: relative; z-index: 3;
  text-align: center; padding: 40px 30px;
  animation: heroReveal 1.8s cubic-bezier(.16,1,.3,1) both;
}
@keyframes heroReveal { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

.hero-label {
  font-size:11px; letter-spacing:4px; text-transform:uppercase;
  color:rgba(255,255,255,.85); font-weight:300; margin-bottom:28px;
  opacity:0; animation:fadeUp 1s ease .3s both;
  text-shadow:0 1px 4px rgba(0,0,0,.3);
}
.hero-monogram {
  font-family:'Great Vibes',cursive; font-size:96px; color:#fff; line-height:1; margin-bottom:8px;
  opacity:0; animation:fadeUp 1.2s ease .5s both;
  text-shadow:0 4px 24px rgba(201,125,110,.5), 0 2px 8px rgba(0,0,0,.3);
}
.hero-names {
  font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:300; letter-spacing:3px;
  color:rgba(255,255,255,.95); margin-bottom:24px;
  opacity:0; animation:fadeUp 1.2s ease .7s both;
  text-shadow:0 1px 6px rgba(0,0,0,.3);
}
.hero-divider {
  display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:24px;
  opacity:0; animation:fadeUp 1s ease .9s both;
}
.hero-divider::before,.hero-divider::after { content:''; width:50px; height:1px; background:linear-gradient(to right,transparent,rgba(201,169,110,.8)); }
.hero-divider::after { background:linear-gradient(to left,transparent,rgba(201,169,110,.8)); }
.hero-divider span { font-size:16px; color:var(--gold); }
.hero-date {
  font-family:'Cormorant Garamond',serif; font-size:15px; letter-spacing:2px;
  color:rgba(255,255,255,.8); font-style:italic;
  opacity:0; animation:fadeUp 1s ease 1.1s both;
  text-shadow:0 1px 4px rgba(0,0,0,.3);
}

.scroll-hint {
  position:absolute; bottom:32px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:8px;
  z-index:3; opacity:0; animation:fadeIn 1s ease 2s both;
}
.scroll-hint span { font-size:10px; letter-spacing:2px; color:rgba(255,255,255,.65); }
.scroll-line {
  width:1px; height:40px;
  background:linear-gradient(to bottom,rgba(255,255,255,.6),transparent);
  animation:scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse { 0%,100%{transform:scaleY(1);opacity:.6} 50%{transform:scaleY(1.3);opacity:1} }

/* ═══ SECTION BASE ═══ */
.section {
  padding: 60px 32px; position: relative;
  opacity: 0; transform: translateY(40px);
  transition: opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1);
  will-change: opacity;
  background: white; /* 다음 섹션이 영상을 덮도록 배경색 지정 */
}
.section.visible { opacity:1; transform:translateY(0); }
.section-label { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--rose); text-align:center; margin-bottom:16px; }
.section-title { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:400; text-align:center; color:var(--deep); margin-bottom:32px; font-style:italic; }

/* ═══ GREETING ═══ */
.greeting-section { background:white; text-align:center; }
.greeting-ornament { font-size:40px; margin-bottom:20px; display:block; }
.greeting-text { font-size:14px; line-height:2.2; color:#6d5f58; font-weight:300; word-break:keep-all; }
.greeting-text strong { color:var(--rose); font-weight:400; }

/* ═══ CONTACT ═══ */
.contact-section { background: var(--ivory); }
.contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.contact-card {
  background:white; border-radius:16px; padding:20px 16px; text-align:center;
  box-shadow:0 2px 12px rgba(201,125,110,.08);
  border:1px solid rgba(232,196,184,.3);
}
.contact-role { font-size:9px; letter-spacing:2px; color:var(--sage); text-transform:uppercase; margin-bottom:6px; }
.contact-name { font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--deep); margin-bottom:14px; }
.contact-btns { display:flex; gap:8px; justify-content:center; }
.contact-btn {
  display:flex; align-items:center; gap:5px;
  padding:7px 12px; border-radius:20px; font-size:11px;
  border:none; cursor:pointer; font-family:'Noto Serif KR',serif;
  transition:all .2s; text-decoration:none; white-space:nowrap;
}
.contact-btn.call { background:var(--rose); color:white; }
.contact-btn.sms  { background:var(--petal); color:var(--rose); }
.contact-btn:active { transform:scale(.94); }

/* ═══ DATE ═══ */
.date-section { background:linear-gradient(170deg,var(--petal) 0%,var(--ivory) 100%); text-align:center; }
.date-card {
  background:white; border-radius:20px; padding:36px 24px;
  box-shadow:0 8px 40px rgba(201,125,110,.1);
  position:relative; overflow:hidden;
}
.date-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(to right,var(--blush),var(--rose),var(--gold)); }
.date-big { font-family:'Cormorant Garamond',serif; font-size:64px; font-weight:300; color:var(--rose); line-height:1; margin-bottom:4px; }
.date-year { font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--sage); letter-spacing:4px; margin-bottom:20px; }
.date-info { display:flex; justify-content:center; margin-bottom:24px; }
.date-info-item { padding:12px 20px; position:relative; }
.date-info-item:not(:last-child)::after { content:''; position:absolute; right:0; top:20%; height:60%; width:1px; background:var(--blush); }
.date-info-item .label { font-size:10px; letter-spacing:2px; color:var(--sage); display:block; margin-bottom:6px; }
.date-info-item .value { font-family:'Cormorant Garamond',serif; font-size:16px; color:var(--deep); }
.countdown { display:flex; justify-content:center; gap:8px; margin-top:8px; }
.countdown-item { background:var(--petal); border-radius:12px; padding:12px 10px 8px; min-width:58px; text-align:center; }
.countdown-item .num { font-family:'Cormorant Garamond',serif; font-size:28px; color:var(--rose); display:block; line-height:1; }
.countdown-item .unit { font-size:9px; letter-spacing:1px; color:var(--sage); margin-top:4px; display:block; }

/* ═══ GALLERY ═══ */
.gallery-section { background:var(--deep); }
.gallery-section .section-label { color:var(--blush); }
.gallery-section .section-title { color:var(--ivory); }
.gallery-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; }
.gallery-thumb {
  aspect-ratio:1; border-radius:6px; overflow:hidden;
  cursor:pointer; position:relative; transition:transform .2s ease;
}
.gallery-thumb:active { transform:scale(.96); }
.gallery-thumb .thumb-inner {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  font-size:28px; transition:transform .3s ease;
}
.gallery-thumb:hover .thumb-inner { transform:scale(1.06); }
.gallery-thumb:nth-child(1)  .thumb-inner { background:linear-gradient(135deg,#d4a0a0,#c07070); }
.gallery-thumb:nth-child(2)  .thumb-inner { background:linear-gradient(135deg,#a0b4a0,#708070); }
.gallery-thumb:nth-child(3)  .thumb-inner { background:linear-gradient(135deg,#c4b090,#a08060); }
.gallery-thumb:nth-child(4)  .thumb-inner { background:linear-gradient(135deg,#b090c0,#8060a0); }
.gallery-thumb:nth-child(5)  .thumb-inner { background:linear-gradient(135deg,#90b0c0,#607090); }
.gallery-thumb:nth-child(6)  .thumb-inner { background:linear-gradient(135deg,#c0a4b4,#906080); }
.gallery-thumb:nth-child(7)  .thumb-inner { background:linear-gradient(135deg,#a0c4b0,#609080); }
.gallery-thumb:nth-child(8)  .thumb-inner { background:linear-gradient(135deg,#c8a890,#a07050); }
.gallery-thumb:nth-child(9)  .thumb-inner { background:linear-gradient(135deg,#94b0a0,#647860); }
.gallery-thumb:nth-child(10) .thumb-inner { background:linear-gradient(135deg,#d0a8b0,#a06870); }
.gallery-thumb:nth-child(11) .thumb-inner { background:linear-gradient(135deg,#b4c4a0,#849060); }
.gallery-thumb:nth-child(12) .thumb-inner { background:linear-gradient(135deg,#b0a8d0,#706898); }
.gallery-thumb:nth-child(13) .thumb-inner { background:linear-gradient(135deg,#c0b0a0,#907860); }
.gallery-thumb:nth-child(14) .thumb-inner { background:linear-gradient(135deg,#a4c4c0,#648484); }
.gallery-thumb:nth-child(15) .thumb-inner { background:linear-gradient(135deg,#d4b8a8,#b08068); }
.gallery-thumb:nth-child(16) .thumb-inner { background:linear-gradient(135deg,#9cb4b0,#5c7470); }
.gallery-thumb:nth-child(17) .thumb-inner { background:linear-gradient(135deg,#c8b4c4,#907888); }
.gallery-thumb:nth-child(18) .thumb-inner { background:linear-gradient(135deg,#b0c4a8,#708858); }
.gallery-thumb:nth-child(19) .thumb-inner { background:linear-gradient(135deg,#ccb0a0,#9c7060); }
.gallery-thumb:nth-child(20) .thumb-inner { background:linear-gradient(135deg,#a8bcc8,#607888); }
.thumb-num { position:absolute; bottom:4px; right:6px; font-size:9px; color:rgba(255,255,255,.6); letter-spacing:1px; }

/* ═══ LIGHTBOX ═══ */
#lightbox {
  position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:2000;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .3s ease;
}
#lightbox.open { opacity:1; pointer-events:all; }
.lb-close {
  position:absolute; top:20px; right:20px; width:40px; height:40px; border-radius:50%;
  background:rgba(255,255,255,.15); border:none; color:white; font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; z-index:10; transition:background .2s;
}
.lb-arrow {
  position:absolute; top:50%; transform:translateY(-50%); width:48px; height:48px; border-radius:50%;
  background:rgba(255,255,255,.15); border:none; color:white; font-size:24px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; z-index:10; transition:background .2s;
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
}
.lb-arrow.prev { left:12px; } .lb-arrow.next { right:12px; }
.lb-display {
  width:320px; height:400px; border-radius:16px;
  display:flex; align-items:center; justify-content:center; font-size:80px;
  box-shadow:0 8px 60px rgba(0,0,0,.6);
  transition:transform .25s cubic-bezier(.16,1,.3,1), opacity .25s ease;
}
.lb-counter {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif; font-size:14px;
  color:rgba(255,255,255,.6); letter-spacing:2px; white-space:nowrap;
}

/* ═══ LOCATION ═══ */
.location-section { background:var(--mist); }
.map-frame { border-radius:16px; overflow:hidden; margin-bottom:20px; box-shadow:0 4px 20px rgba(0,0,0,0.12); }
.map-frame img { width:100%; height:auto; display:block; }
.btn {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:16px; border-radius:50px; border:none; cursor:pointer;
  font-family:'Noto Serif KR',serif; font-size:13px; letter-spacing:1px;
  transition:all .3s ease; margin-top:16px; text-decoration:none;
}
.btn-primary { background:linear-gradient(135deg,var(--rose),#b06050); color:white; }

/* ═══ ACCOUNT ═══ */
.account-section { background:white; }
.account-card { background:var(--petal); border-radius:16px; padding:20px; margin-bottom:12px; }
.copy-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 14px; border-radius:20px; background:var(--rose); color:white;
  font-size:11px; border:none; cursor:pointer; margin-top:10px;
}

/* ═══ CLOSING ═══ */
.closing-section {
  background:linear-gradient(170deg,var(--deep) 0%,#2a2020 100%);
  text-align:center; padding:80px 32px; position:relative; overflow:hidden;
}
.closing-monogram { font-family:'Great Vibes',cursive; font-size:72px; color:var(--blush); margin-bottom:16px; }

@keyframes fadeUp  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<audio id="bgm" loop preload="none">
  <source src="YOUR_MUSIC.mp3" type="audio/mpeg">
</audio>

<button id="music-btn" onclick="toggleMusic()" title="배경음악 토글">
  <div class="music-bars"><span></span><span></span><span></span><span></span></div>
</button>

<section class="hero">
  <video class="hero-video" id="hero-video"
    autoplay muted loop playsinline
    webkit-playsinline x5-playsinline
    preload="auto" fetchpriority="high"
    poster="https://raw.githubusercontent.com/ygeo1204/ygeo/main/KakaoTalk_20260308_195422244.jpg">

<script>
  // Intersection Observer로 섹션 등장 애니메이션 처리
  const observerOptions = { threshold: 0.15 };
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, observerOptions);

  document.querySelectorAll('.section').forEach(el => observer.observe(el));

  // 음악 토글 로직
  function toggleMusic() {
    const bgm = document.getElementById('bgm');
    const btn = document.getElementById('music-btn');
    if (bgm.paused) {
      bgm.play();
      btn.classList.add('playing');
    } else {
      bgm.pause();
      btn.classList.remove('playing');
    }
  }

  // 갤러리/카운트다운 등 기타 기존 스크립트가 들어갈 자리입니다.
</script>
